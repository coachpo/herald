# Herald local development stack (FastAPI + PostgreSQL + Worker)
#
# Usage:
#   docker compose up              # start all services
#   docker compose up -d db        # start PostgreSQL only
#   docker compose up api          # start API + DB
#   docker compose logs -f api     # follow API logs

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: herald_dev
      POSTGRES_USER: herald
      POSTGRES_PASSWORD: herald
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herald -d herald_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://herald:herald@db:5432/herald_dev
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-insecure}
      CHANNEL_CONFIG_ENCRYPTION_KEY: ${CHANNEL_CONFIG_ENCRYPTION_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "backend.worker"]
    environment:
      DATABASE_URL: postgresql://herald:herald@db:5432/herald_dev
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      CHANNEL_CONFIG_ENCRYPTION_KEY: ${CHANNEL_CONFIG_ENCRYPTION_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-1.0}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-50}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
