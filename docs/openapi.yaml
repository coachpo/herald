      summary: List Rules
      description: List all forwarding rules.
      operationId: list_rules_api_rules_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesResponse'
      security:
      - HTTPBearer: []
    post:
      summary: Create Rule Route
      operationId: create_rule_route_api_rules_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/rules/{rule_id}:
    get:
      summary: Get Rule
      description: Get single forwarding rule.
      operationId: get_rule_api_rules__rule_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
