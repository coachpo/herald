  /api/auth/reset-password:
    post:
      tags:
      - auth
      summary: Reset Password Endpoint
      operationId: reset_password_endpoint_api_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/messages:
    get:
      summary: List Messages
      description: List messages with optional filters.
      operationId: list_messages_api_messages_get
      security:
      - HTTPBearer: []
      parameters:
      - name: ingest_endpoint_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Ingest Endpoint Id
      - name: priority_min
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Priority Min
      - name: priority_max
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Priority Max
      - name: from
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: From
      - name: to
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: To
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/messages/{message_id}:
    get:
      summary: Get Message
      description: Get single message detail.
      operationId: get_message_api_messages__message_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Message Route
      operationId: delete_message_route_api_messages__message_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Message Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/messages/batch-delete:
    post:
      summary: Batch Delete Messages Route
      operationId: batch_delete_messages_route_api_messages_batch_delete_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteMessagesRequest'
        required: true
      responses:
