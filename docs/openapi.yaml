          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      summary: Update Rule Route
      operationId: update_rule_route_api_rules__rule_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Rule Route
      operationId: delete_rule_route_api_rules__rule_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/rules/{rule_id}/test:
    post:
      summary: Test Single Rule Route
      operationId: test_single_rule_route_api_rules__rule_id__test_post
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Rule Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestRuleRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleTestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/rules/test:
    post:
      summary: Test All Rules Route
      operationId: test_all_rules_route_api_rules_test_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestAllRulesRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllRulesTestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/ingest-endpoints:
    get:
      summary: List Ingest Endpoints
      description: List all ingest endpoints.
      operationId: list_ingest_endpoints_api_ingest_endpoints_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestEndpointsResponse'
      security:
      - HTTPBearer: []
    post:
      summary: Create Ingest Endpoint Route
      operationId: create_ingest_endpoint_route_api_ingest_endpoints_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestEndpointCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestEndpointCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/ingest-endpoints/{endpoint_id}:
    get:
      summary: Get Ingest Endpoint Detail
      description: Get single ingest endpoint.
      operationId: get_ingest_endpoint_detail_api_ingest_endpoints__endpoint_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestEndpointResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      summary: Update Ingest Endpoint Route
      operationId: update_ingest_endpoint_route_api_ingest_endpoints__endpoint_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestEndpointUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestEndpointResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Ingest Endpoint Route
      operationId: delete_ingest_endpoint_route_api_ingest_endpoints__endpoint_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest-endpoints/{endpoint_id}/revoke:
    post:
      summary: Revoke Ingest Endpoint Route
      operationId: revoke_ingest_endpoint_route_api_ingest_endpoints__endpoint_id__revoke_post
      security:
      - HTTPBearer: []
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/edge-config:
    get:
      summary: Get Edge Config
      operationId: get_edge_config_api_edge_config_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ingest/{endpoint_id}:
    post:
      summary: Ingest Message
      operationId: ingest_message_api_ingest__endpoint_id__post
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          title: Endpoint Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestMessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AllRulesTestResponse:
      properties:
        matched_count:
          type: integer
          title: Matched Count
        total_rules:
          type: integer
          title: Total Rules
        matches:
          items:
            $ref: '#/components/schemas/MatchPreview'
          type: array
          title: Matches
      type: object
      required:
      - matched_count
      - total_rules
      - matches
      title: AllRulesTestResponse
      description: Test all rules response.
    AuthSessionResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        refresh_token:
          type: string
          title: Refresh Token
        user:
          $ref: '#/components/schemas/User'
      type: object
      required:
      - access_token
      - refresh_token
      - user
      title: AuthSessionResponse
    BatchDeleteMessagesRequest:
      properties:
        older_than_days:
          type: integer
          minimum: 1.0
          title: Older Than Days
        ingest_endpoint_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Ingest Endpoint Id
      type: object
      required:
      - older_than_days
      title: BatchDeleteMessagesRequest
    BatchDeleteMessagesResponse:
      properties:
        deleted_count:
          type: integer
          title: Deleted Count
      type: object
      required:
      - deleted_count
      title: BatchDeleteMessagesResponse
    ChangeEmailRequest:
      properties:
        new_email:
          type: string
          title: New Email
      type: object
      required:
      - new_email
      title: ChangeEmailRequest
      description: Change email request.
    ChangePasswordRequest:
      properties:
        old_password:
          type: string
          title: Old Password
        new_password:
          type: string
          title: New Password
      type: object
      required:
      - old_password
      - new_password
      title: ChangePasswordRequest
      description: Change password request.
    Channel:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        type:
          type: string
          title: Type
        name:
          type: string
          title: Name
        created_at:
          type: string
          format: date-time
          title: Created At
        disabled_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Disabled At
      type: object
      required:
      - id
      - type
      - name
      - created_at
      - disabled_at
      title: Channel
      description: Channel response model (without config).
    ChannelCreateRequest:
      properties:
        type:
          type: string
          title: Type
        name:
          type: string
          maxLength: 200
          minLength: 1
          title: Name
        config:
          type: object
          title: Config
      type: object
      required:
      - type
      - name
      - config
      title: ChannelCreateRequest
    ChannelTestRequest:
      properties:
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        body:
          anyOf:
          - type: string
          - type: 'null'
          title: Body
        payload_json:
          anyOf:
          - type: object
          - type: 'null'
          title: Payload Json
      type: object
      title: ChannelTestRequest
    ChannelTestResponse:
