          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelsResponse'
      security:
      - HTTPBearer: []
    post:
      summary: Create Channel Route
      operationId: create_channel_route_api_channels_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelWithConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
