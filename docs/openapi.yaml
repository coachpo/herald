              schema:
                $ref: '#/components/schemas/BatchDeleteMessagesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/messages/{message_id}/deliveries:
    get:
      summary: Get Message Deliveries
      description: Get deliveries for a message.
      operationId: get_message_deliveries_api_messages__message_id__deliveries_get
      security:
      - HTTPBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Message Id
      responses:
        '200':
